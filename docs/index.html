<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Auto MP4 Generator</title>

<style>

body{
  background:#111;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
}

input{
  width:100%;
  margin-top:15px;
  padding:12px;
  border-radius:10px;
}

video{
  width:100%;
  margin-top:20px;
  border-radius:10px;
  display:none;
}

#status{
  margin-top:15px;
  text-align:center;
  color:#ffeaa7;
}

</style>
</head>

<body>

<div class="container">

<h2>Auto MP4 Generator</h2>

<input
type="file"
id="video"
accept="video/*">

<input
type="file"
id="audio"
accept="audio/*">

<div id="status"></div>

<video
id="preview"
controls>
</video>

</div>

<script>

const videoInput =
document.getElementById("video");

const audioInput =
document.getElementById("audio");

const statusDiv =
document.getElementById("status");

const preview =
document.getElementById("preview");

let uploaded = false;

videoInput.addEventListener(
"change",
checkFiles
);

audioInput.addEventListener(
"change",
checkFiles
);

async function checkFiles(){

  const video =
  videoInput.files[0];

  const audio =
  audioInput.files[0];

  if(video){

    preview.src =
    URL.createObjectURL(video);

    preview.style.display =
    "block";
  }

  if(video && audio && !uploaded){

    uploaded = true;

    statusDiv.innerText =
    "Uploading files...";

    // upload video
    const videoForm =
    new FormData();

    videoForm.append(
      "file",
      video
    );

    // upload audio
    const audioForm =
    new FormData();

    audioForm.append(
      "file",
      audio
    );

    // contoh upload ke tmpfiles.org
    const videoUpload =
    await fetch(
      "https://tmpfiles.org/api/v1/upload",
      {
        method:"POST",
        body:videoForm
      }
    );

    const videoJson =
    await videoUpload.json();

    const audioUpload =
    await fetch(
      "https://tmpfiles.org/api/v1/upload",
      {
        method:"POST",
        body:audioForm
      }
    );

    const audioJson =
    await audioUpload.json();

    statusDiv.innerText =
    "Triggering workflow...";

    // trigger github actions
    await fetch(

      "https://api.github.com/repos/USERNAME/REPO/actions/workflows/render.yml/dispatches",

      {

        method:"POST",

        headers:{

          "Accept":
          "application/vnd.github+json",

          "Authorization":
          "Bearer GITHUB_TOKEN"
        },

        body:JSON.stringify({

          ref:"main",

          inputs:{

            video_url:
            videoJson.data.url,

            audio_url:
            audioJson.data.url
          }
        })
      }
    );

    statusDiv.innerText =
    "Workflow started...";
  }
}

</script>

</body>
</html>
